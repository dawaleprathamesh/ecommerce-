<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout | AURA Parfums</title>
  <link rel="stylesheet" href="./css/styles.css" />
  <style>
    .checkout-header { text-align: center; padding: 2rem 0; border-bottom: 1px solid var(--color-border); }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    .full-width { grid-column: 1 / -1; }
    .section-title { font-family: var(--font-serif); font-size: 1.5rem; margin-bottom: 1.5rem; margin-top: 2rem; }
  </style>
</head>
<body>
  <header class="checkout-header">
    <a href="index.html" class="navbar-brand">AURA</a>
  </header>

  <section class="section" style="padding-top: 3rem;">
    <div class="checkout-layout">
      <div class="checkout-main">
        <form action="thankyou.html">
          <h2 class="section-title">Shipping Information</h2>
          <div class="form-grid">
            <div class="form-group"><label>First Name</label><input type="text" class="form-control" required /></div>
            <div class="form-group"><label>Last Name</label><input type="text" class="form-control" required /></div>
            <div class="form-group full-width"><label>Address</label><input type="text" class="form-control" required /></div>
            <div class="form-group full-width"><label>Apartment (optional)</label><input type="text" class="form-control" /></div>
            <div class="form-group"><label>City</label><input type="text" class="form-control" required /></div>
            <div class="form-group"><label>Postal Code</label><input type="text" class="form-control" required /></div>
          </div>

          <h2 class="section-title">Payment Method</h2>
          <div class="form-grid">
            <div class="form-group full-width"><label>Card Number</label><input type="text" class="form-control" placeholder="0000 0000 0000 0000" required /></div>
            <div class="form-group"><label>Expiration Date</label><input type="text" class="form-control" placeholder="MM/YY" required /></div>
            <div class="form-group"><label>Security Code (CVV)</label><input type="password" class="form-control" placeholder="123" required /></div>
          </div>

          <button type="submit" class="btn btn-primary" style="margin-top: 2rem; width: 100%;">Place Order</button>
        </form>
      </div>

      <div class="checkout-sidebar">
        <div class="cart-items" style="margin-bottom: 2rem; max-height: 400px; overflow-y: auto;">
          <div class="cart-item" style="padding: 1rem 0;">
            <img src="./assets/images/perfume_1.png" alt="Midnight Oud" style="width: 60px; height: 80px; object-fit: cover;" />
            <div class="cart-item-details" style="font-size: 0.875rem;">
              <span style="font-family: var(--font-serif); font-size: 1rem;">Midnight Oud</span>
              <span>Qty: 1</span>
              <span>$ 295.00</span>
            </div>
          </div>
        </div>

        <div class="summary-row"><span>Subtotal</span><span>$ 545.00</span></div>
        <div class="summary-row"><span>Shipping</span><span>$ 0.00</span></div>
        <div class="summary-row"><span>Estimated Tax</span><span>$ 45.00</span></div>
        <div class="summary-row summary-total"><span>Total</span><span>$ 590.00</span></div>
      </div>
    </div>
  </section>
</body>
</html>
