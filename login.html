<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login / Register | AURA Parfums</title>
  <link rel="stylesheet" href="./css/styles.css" />
  <style>
    .auth-toggle { display: flex; gap: 2rem; margin-bottom: 2rem; border-bottom: 1px solid var(--color-border); padding-bottom: 1rem; }
    .auth-toggle span { font-family: var(--font-serif); font-size: 1.25rem; color: var(--color-text-secondary); cursor: pointer; transition: color var(--transition-fast); }
    .auth-toggle span.active { color: var(--color-text-primary); }
  </style>
</head>
<body>
  <div class="split-screen">
    <div class="split-left">
      <img src="./assets/images/lifestyle.png" alt="Lifestyle" class="split-image" />
    </div>

    <div class="split-right">
      <div class="form-container">
        <div style="margin-bottom: 3rem; text-align: center;">
          <a href="index.html" class="navbar-brand">AURA</a>
        </div>

        <div class="auth-toggle">
          <span class="active">Log In</span>
          <span>Create Account</span>
        </div>

        <form>
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" class="form-control" required />
          </div>

          <div class="form-group">
            <label>Password</label>
            <input type="password" class="form-control" required />
          </div>

          <div style="text-align: right; margin-bottom: 1.5rem;">
            <a href="#" class="text-small">Forgot Password?</a>
          </div>

          <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>

          <div style="margin-top: 2rem; text-align: center; position: relative;">
            <hr style="border: none; border-top: 1px solid var(--color-border); margin: 1rem 0;" />
            <span style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--color-bg); padding: 0 1rem; color: var(--color-text-secondary); font-size: 0.875rem;">Or continue with</span>
          </div>

          <div style="display: flex; gap: 1rem; margin-top: 2rem;">
            <button type="button" class="btn btn-outline" style="flex: 1;">Google</button>
            <button type="button" class="btn btn-outline" style="flex: 1;">Apple</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="./js/script.js"></script>
</body>
</html>
