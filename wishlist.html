<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wishlist | AURA Parfums</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="navbar-brand">AURA</a>
    <div class="navbar-links">
      <a href="index.html">Fragrances</a>
      <a href="collections.html">Collections</a>
      <a href="gifts.html">Gifts</a>
      <a href="story.html">Our Story</a>
    </div>
    <div class="navbar-icons">
      <a href="wishlist.html" aria-label="Wishlist">
        <svg viewBox="0 0 24 24" fill="currentColor" class="active" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
        </svg>
      </a>
      <a href="cart.html" aria-label="Cart">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="21" r="1"></circle>
          <circle cx="20" cy="21" r="1"></circle>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
        </svg>
      </a>
    </div>
  </nav>

  <section class="section">
    <div class="wishlist-header">
      <h2 class="title-medium">Your Wishlist</h2>
      <p class="text-small">3 Items Saved</p>
    </div>

    <div class="product-grid">
      <div class="product-card">
        <div class="product-image-container">
          <img src="./assets/images/perfume_1.png" alt="Midnight Oud" class="product-image" />
          <button class="wishlist-btn active" aria-label="Remove">
            <svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.5">
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
            </svg>
          </button>
          <button class="btn btn-primary" style="position: absolute; bottom: 0; width: 100%; border: none; padding: 1rem;">Move to Cart</button>
        </div>
        <div class="product-info">
          <h3 class="product-title">Midnight Oud</h3>
          <p class="product-price">$ 295.00</p>
        </div>
      </div>

      <div class="product-card">
        <div class="product-image-container">
          <img src="./assets/images/perfume_2.png" alt="Santal Blanc" class="product-image" />
          <button class="wishlist-btn active" aria-label="Remove">
            <svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.5">
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
            </svg>
          </button>
          <button class="btn btn-primary" style="position: absolute; bottom: 0; width: 100%; border: none; padding: 1rem;">Move to Cart</button>
        </div>
        <div class="product-info">
          <h3 class="product-title">Santal Blanc</h3>
          <p class="product-price">$ 285.00</p>
        </div>
      </div>

      <div class="product-card">
        <div class="product-image-container">
          <img src="./assets/images/perfume_3.png" alt="Amber Soleil" class="product-image" />
          <button class="wishlist-btn active" aria-label="Remove">
            <svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.5">
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
            </svg>
          </button>
          <button class="btn btn-primary" style="position: absolute; bottom: 0; width: 100%; border: none; padding: 1rem;">Move to Cart</button>
        </div>
        <div class="product-info">
          <h3 class="product-title">Amber Soleil</h3>
          <p class="product-price">$ 310.00</p>
        </div>
      </div>
    </div>
  </section>

  <script src="./js/script.js"></script>
</body>
</html>
